<body>
    <header>
        <div class="navbar">
            <div id="nav-logo" class="border">
                <div id="logo"></div>
             </div>
              <div class="nav address border">
                        <p class="tom">Dilever to</p>
                        <div class="add-icon">
                            <i class="fa-solid fa-location-dot"></i>

                            <p class="com">India</p>


                        </div>

                    </div>

                        <select class="search-select">

                    </div>
                    <div id="nav-return">
                        <h5>Returns</h5>

                    </div>
                    <div id="nav-cart">
                        <i class="fa-solid fa-cart-shopping"></i>
                        cart
                    </div>


        </div>
        <div class="pannel">
            <div class="pannel-icon">
                <i class="fa-solid fa-bars-staggered"></i>
                All
            </div>
            <div class="pannel-option">
                <p>Today's Deals</p>
                <p>Gift cards</p>
                <p>Sell</p>
                <p>Registry</p>
                <p>Prime Video</p>
                <p>Customer Services</p>
            </div>
            
        </div>
    </header>

        <div class="hero-msg">
